<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="meta.product.title">System — TimMetal</title>
<meta name="description" content="TimMetal process system — technical specification and capacity, engineered in marine-grade inox." data-i18n-attr="content:meta.product.desc">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#141414">
<meta property="og:type" content="website">
<meta property="og:site_name" content="TimMetal">
<meta property="og:title" content="Systems — TimMetal" data-i18n-attr="content:meta.product.title">
<meta property="og:description" content="TimMetal process system — technical specification and capacity, engineered in marine-grade inox." data-i18n-attr="content:meta.product.desc">
<meta property="og:image" content="/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/og.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<script src="/js/i18n.js"></script>
</head>
<body>
<div style="position:relative; width:100%; background:var(--tm-cream); color:var(--tm-ink); font-family:'Archivo', system-ui, sans-serif; -webkit-font-smoothing:antialiased;">

  <!-- Fixed nav — shared partial, injected by include.js -->
  <div data-include="nav"></div>

  <!-- Single-product detail — rendered from /products.json by products.js,
       keyed off the slug in the URL (/products/<slug>). -->
  <main id="tm-detail-root" style="padding:clamp(96px,12vh,140px) clamp(22px,6vw,96px) clamp(90px,12vh,150px);"></main>

</div>

<!-- Dark footer layer — shared footer partial sits on the dark ground. -->
<section class="tm-reveal" style="background:#141414; color:#fff; font-family:'Archivo', system-ui, sans-serif;">
  <div class="tm-foot-only" style="max-width:1200px; margin:0 auto; padding:0 clamp(22px,6vw,96px) clamp(48px,7vh,88px);">
    <div data-include="footer"></div>
  </div>
</section>

<script src="/js/include.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/products.js"></script>
</body>
</html>
