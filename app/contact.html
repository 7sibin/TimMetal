<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="meta.contact.title">Contact — TimMetal</title>
<meta name="description" content="Get in touch with TimMetal — headquarters and workshop in Belgrade (Borča), Serbia. Send a project enquiry or find us on the map." data-i18n-attr="content:meta.contact.desc">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#141414">
<meta property="og:type" content="website">
<meta property="og:site_name" content="TimMetal">
<meta property="og:title" content="Contact — TimMetal" data-i18n-attr="content:meta.contact.title">
<meta property="og:description" content="Headquarters and workshop in Belgrade (Borča), Serbia. Send a project enquiry or find us on the map." data-i18n-attr="content:meta.contact.desc">
<meta property="og:image" content="/og.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/og.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="/css/styles.css">
<script src="/js/i18n.js"></script>
<style>
  .tm-input { width:100%; background:transparent; border:0; border-bottom:1px solid rgba(255,255,255,0.2); padding:10px 2px; font-family:'Archivo', system-ui, sans-serif; font-size:15px; color:#F3EFE6; outline:none; transition:border-color .3s ease; }
  .tm-input::placeholder { color:rgba(255,255,255,0.32); }
  .tm-input:focus { border-bottom-color:var(--tm-red); }
  textarea.tm-input { resize:none; }
  /* real map, brand-tinted controls */
  .tm-leaflet { background:var(--tm-cream); }
  .tm-leaflet .leaflet-control-attribution { background:rgba(243,239,230,0.82); font-family:'Space Mono', monospace; font-size:9px; }
  .tm-leaflet .leaflet-bar a { background:#14171A; color:#F3EFE6; border-bottom:1px solid rgba(255,255,255,0.15); }
  .tm-leaflet .leaflet-bar a:hover { background:var(--tm-red); }
  .tm-pin { position:relative; width:16px; height:16px; }
  .tm-pin i { position:absolute; inset:0; border-radius:50%; background:var(--tm-red); border:2px solid #F3EFE6; box-shadow:0 1px 6px rgba(0,0,0,0.3); }
  .tm-pin::after { content:""; position:absolute; inset:0; border-radius:50%; background:var(--tm-red); animation:tmPing 2.6s ease-out infinite; }
  @keyframes tmPing { 0%{ transform:scale(1); opacity:0.55; } 70%,100%{ transform:scale(3.6); opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .tm-pin::after{ animation:none; } }
  .tm-contact-shell { display:grid; grid-template-columns:minmax(340px,400px) 1fr; height:100vh; padding-top:64px; }
  @media (max-width:900px){
    .tm-contact-shell{ grid-template-columns:1fr; height:auto; }
    .tm-map{ min-height:60vh; order:2; }
    .tm-side{ order:1; }
  }
</style>
</head>
<body>
<div style="position:relative; width:100%; min-height:100vh; background:var(--tm-cream); color:var(--tm-ink); font-family:'Archivo', system-ui, sans-serif; -webkit-font-smoothing:antialiased;">

  <!-- Fixed nav — shared partial, injected by include.js -->
  <div data-include="nav"></div>

  <!-- ===== SIDEBAR | MAP ===== -->
  <div class="tm-contact-shell">

    <!-- DARK INFO SIDEBAR -->
    <aside class="tm-side tm-stagger" style="background:#111111; color:#F3EFE6; padding:clamp(26px,3vh,40px) clamp(26px,2vw,38px); overflow:auto; display:flex; flex-direction:column; gap:clamp(20px,2.4vh,30px);">

      <div style="display:flex; align-items:center; gap:12px; font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.28em;"><span style="width:24px; height:2px; background:var(--tm-red);"></span><span style="color:var(--tm-red);">01</span><span style="color:rgba(255,255,255,0.5);" data-i18n="contact.kicker">// CONTACT</span></div>

      <!-- Headquarters -->
      <div style="display:flex; gap:16px;">
        <div style="flex-shrink:0; width:40px; height:40px; border:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; color:var(--tm-red);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 21V5l7-3v19M11 21V9l8 3v9M4 21h17"/><path d="M14 13h1M14 16h1M7 8h1M7 12h1"/></svg>
        </div>
        <div>
          <div style="font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.2em; color:var(--tm-red);" data-i18n="contact.hq.label">HEADQUARTERS</div>
          <div style="margin-top:8px; font-size:14px; line-height:1.55; color:rgba(255,255,255,0.72);">Bulevar Industrije 12<br /><span data-i18n="contact.hq.city">11000 Belgrade (Borča)</span><br /><span data-i18n="contact.hq.country">Republic of Serbia</span></div>
          <div style="margin-top:10px; font-size:13px; line-height:1.7; color:rgba(255,255,255,0.5); font-family:'Space Mono', monospace;">T / <a href="tel:+381110000000" class="tm-link" style="color:rgba(255,255,255,0.5); text-decoration:none;">+381 11 000 0000</a><br />E / <a href="mailto:engineering@timmetal.com" class="tm-link" style="color:rgba(255,255,255,0.5); text-decoration:none;">engineering@timmetal.com</a></div>
        </div>
      </div>

      <!-- Production -->
      <div style="display:flex; gap:16px; border-top:1px solid rgba(255,255,255,0.1); padding-top:clamp(22px,2.6vh,32px);">
        <div style="flex-shrink:0; width:40px; height:40px; border:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; color:var(--tm-red);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 21h18M4 21V11l6 4V11l6 4V6l4 2v13"/><path d="M7 21v-4M13 21v-4"/></svg>
        </div>
        <div>
          <div style="font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.2em; color:var(--tm-red);" data-i18n="contact.prod.label">PRODUCTION</div>
          <div style="margin-top:8px; font-size:14px; line-height:1.55; color:rgba(255,255,255,0.72);">Ovčanski put 14m<br /><span data-i18n="contact.prod.city">11000 Belgrade (Borča)</span></div>
          <div style="margin-top:10px; font-size:13px; line-height:1.4; color:rgba(255,255,255,0.5); font-family:'Space Mono', monospace;" data-i18n="contact.prod.hours">HOURS / Mon&ndash;Fri 08&ndash;17</div>
        </div>
      </div>

      <!-- GPS -->
      <div style="display:flex; gap:16px; border-top:1px solid rgba(255,255,255,0.1); padding-top:clamp(22px,2.6vh,32px);">
        <div style="flex-shrink:0; width:40px; height:40px; border:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; color:var(--tm-red);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        </div>
        <div>
          <div style="font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.2em; color:var(--tm-red);" data-i18n="contact.gps.label">GPS COORDINATES</div>
          <div style="margin-top:8px; font-size:15px; font-family:'Space Mono', monospace; color:rgba(255,255,255,0.72);">44.84210, 20.46120</div>
        </div>
      </div>

      <!-- compact enquiry form -->
      <form id="tm-contact-form" style="border-top:1px solid rgba(255,255,255,0.1); padding-top:clamp(22px,2.6vh,32px); display:flex; flex-direction:column; gap:18px;">
        <div style="font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.2em; color:var(--tm-red);" data-i18n="contact.form.heading">SEND AN ENQUIRY</div>
        <input class="tm-input" name="name" placeholder="Name / company" data-i18n-attr="placeholder:contact.form.name" required />
        <input class="tm-input" type="email" name="email" placeholder="Email address" data-i18n-attr="placeholder:contact.form.email" required />
        <textarea class="tm-input" name="message" rows="2" placeholder="Brief project description&hellip;" data-i18n-attr="placeholder:contact.form.msg"></textarea>
        <button type="submit" style="align-self:flex-start; margin-top:2px; display:inline-flex; align-items:center; gap:12px; background:var(--tm-red); color:#F3EFE6; border:0; padding:13px 22px; font-family:'Space Mono', monospace; font-size:11px; letter-spacing:0.2em; cursor:pointer; transition:background .3s ease;">
          <span data-btn-label data-i18n="contact.form.send">SEND</span>
          <span style="width:20px; height:1px; background:currentColor; position:relative;"><span style="position:absolute; right:0; top:-3px; width:6px; height:6px; border-top:1px solid currentColor; border-right:1px solid currentColor; transform:rotate(45deg);"></span></span>
        </button>
      </form>

    </aside>

    <!-- REAL MAP -->
    <div class="tm-map" style="position:relative; min-height:100%;">
      <div id="tm-map" class="tm-leaflet" style="position:absolute; inset:0;"></div>
      <div style="position:absolute; z-index:1000; top:16px; left:16px; pointer-events:none; font-family:'Space Mono', monospace; font-size:10px; letter-spacing:0.2em; color:#14171A; background:rgba(243,239,230,0.82); padding:6px 10px; border:1px solid rgba(20,23,26,0.14);" data-i18n="contact.map.badge">03 / MAP &mdash; TIMMETAL HQ</div>
    </div>

  </div>
</div>

<!-- ============ FOOTER (dark) ============ -->
<section style="background:#141414; color:#fff; font-family:'Archivo', system-ui, sans-serif;">
  <div class="tm-foot-only" style="max-width:1200px; margin:0 auto; padding:0 clamp(22px,6vw,96px) clamp(48px,7vh,88px);">
    <!-- Footer — shared partial, injected by include.js -->
    <div data-include="footer"></div>
  </div>
</section>

<script src="/js/include.js"></script>
<script src="/js/motion.js"></script>
<script>
  // Enquiry form — plain client-side acknowledgement (no backend yet).
  (function () {
    var form = document.getElementById('tm-contact-form');
    if (form) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var label = form.querySelector('[data-btn-label]');
        if (label) label.textContent = (window.tmI18n ? window.tmI18n.t('contact.form.sent', 'SENT ✓') : 'SENT ✓');
        form.reset();
      });
    }

    // Leaflet map — TimMetal HQ, Belgrade (Borča).
    function initMap() {
      var el = document.getElementById('tm-map');
      if (!window.L || !el) return;
      var coords = [44.8421, 20.4612];
      var map = L.map(el, {
        center: coords,
        zoom: 13,
        zoomControl: false,
        scrollWheelZoom: false,
        attributionControl: true
      });
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        crossOrigin: 'anonymous',
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      var icon = L.divIcon({
        className: '',
        html: '<div class="tm-pin"><i></i></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      L.marker(coords, { icon: icon }).addTo(map);
      setTimeout(function () { map.invalidateSize(); }, 250);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMap);
    } else {
      initMap();
    }
  })();
</script>
</body>
</html>
