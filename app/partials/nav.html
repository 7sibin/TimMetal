<!-- Fixed nav — shared across pages, extracted from the v2 hero sheet.
     On the homepage it starts hidden (opacity:0) and hero.js fades it in
     once the milk pour completes; on pages without the hero canvas,
     include.js reveals it immediately. The active route is marked by
     include.js (markActiveNav). -->
<nav id="tm-nav" style="position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:22px clamp(20px,4vw,52px); opacity:0; transition:opacity .9s ease; pointer-events:none;">
  <a href="/" style="display:flex; align-items:center; gap:10px; text-decoration:none; pointer-events:auto;">
    <span style="width:9px; height:9px; background:var(--tm-red);"></span>
    <span class="tm-wordmark" style="font-family:'Space Mono', monospace; font-size:13px; letter-spacing:0.34em; color:var(--tm-ink); font-weight:700;">TIMMETAL</span>
  </a>
  <!-- Hamburger toggle — hidden on desktop, shown ≤640px by styles.css.
       include.js (wireMobileNav) wires the open/close behaviour. -->
  <button id="tm-nav-toggle" class="tm-nav-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="tm-nav-menu">
    <span></span><span></span><span></span>
  </button>
  <div id="tm-nav-menu" class="tm-nav-links" style="display:flex; flex-wrap:wrap; gap:clamp(16px,3vw,40px); font-family:'Space Mono', monospace; font-size:12px; letter-spacing:0.22em; color:#5a5e63; pointer-events:auto;">
    <a href="/products" class="tm-link" style="color:inherit; text-decoration:none;" data-i18n="nav.systems">SYSTEMS</a><a href="/#plants" class="tm-link" style="color:inherit; text-decoration:none;" data-i18n="nav.plants">PLANTS</a><a href="/about" class="tm-link" style="color:inherit; text-decoration:none;" data-i18n="nav.about">ABOUT</a><a href="/contact" class="tm-link" style="color:inherit; text-decoration:none;" data-i18n="nav.contact">CONTACT</a><span class="tm-langswitch" aria-label="Language / Jezik"><button type="button" class="tm-lang" data-lang-btn="en">EN</button><span class="tm-lang-sep">·</span><button type="button" class="tm-lang" data-lang-btn="sr">SR</button><span class="tm-lang-sep">·</span><button type="button" class="tm-lang" data-lang-btn="hu">HU</button><span class="tm-lang-sep">·</span><button type="button" class="tm-lang" data-lang-btn="mk">MK</button></span>
  </div>
</nav>
